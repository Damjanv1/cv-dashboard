name: Refresh chess dashboard

on:
  schedule:
    # Every Sunday at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install chess/ dependencies
        working-directory: chess
        run: npm install --no-audit --no-fund --silent

      - name: Pull latest games from Lichess
        working-directory: chess
        run: |
          curl -s -H "Accept: application/x-ndjson" \
            "https://lichess.org/api/games/user/damjanv?opening=true&perfType=rapid,blitz,bullet,classical&pgnInJson=false&literate=false" \
            -o games.ndjson
          wc -l games.ndjson

      - name: Aggregate + inject
        working-directory: chess
        run: |
          node aggregate.js
          node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync('summary.json','utf8')); fs.writeFileSync('summary.min.json', JSON.stringify(j));"
          node inject.js

      - name: Commit updated dashboard (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- chess-dashboard.html; then
            echo "No changes to chess-dashboard.html"
            exit 0
          fi
          git add chess-dashboard.html
          git commit -m "chore(chess): weekly refresh from Lichess"
          git push
